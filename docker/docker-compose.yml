# ============================================================
#  docker-compose.yml — Entorno de desarrollo local
#  Servicios: PostgreSQL 16 + Redis 7 + pgAdmin 4
#  Uso: docker compose -f docker/docker-compose.yml up -d
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  #  POSTGRESQL
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: um_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-user_management_db}
      POSTGRES_USER:     ${POSTGRES_USER:-um_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-um_password}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d   # scripts SQL que corren en el primer arranque
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-um_user} -d $${POSTGRES_DB:-user_management_db}"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - um_network

  # ──────────────────────────────────────────────────────────
  #  REDIS
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: um_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-um_redispassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - um_network

  # ──────────────────────────────────────────────────────────
  #  PGADMIN  — UI para explorar la BD (solo dev)
  # ──────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: um_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - um_network
    profiles:
      - tools            # solo se levanta si: docker compose --profile tools up -d

volumes:
  postgres_data:
  redis_data:

networks:
  um_network:
    driver: bridge
